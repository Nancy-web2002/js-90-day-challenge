<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Form</title>
</head>
<body>
    <h1>Login-Form</h1>
    <form id="loginForm">
        <label for="nameInput">Full name</label>
        <input id="nameInput" name="name" type="text" placeholder="Your name"  > <br>
        <label for="emailInput">Email</label>
        <input id="emailInput" name="email" type="text" placeholder="Your email"  > <br>
        <label for="passwordInput">Password</label>
        <input id="passwordInput" name="password" type="password" placeholder="Your password"  > <br>

        <button type="submit" id="submitBtn">Send </button>
    </form>
    <p id="message">Message</p>

    <script src="app.js"></script>
</body>
</html>
